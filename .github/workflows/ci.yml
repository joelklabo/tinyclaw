name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make fmt
      - run: make test
      - run: make coverage
      - name: Upload bundle artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: debug-bundles
          path: bundle-*/
          retention-days: 7
